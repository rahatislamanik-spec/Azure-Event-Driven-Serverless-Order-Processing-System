<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Serverless Laptop Order Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Azure Serverless Laptop Store</h1>
      <p>Submit a laptop order and trigger an Azure event-driven workflow.</p>
      <form id="orderForm">
        <label>First Name<input type="text" id="firstName" required /></label>
        <label>Last Name<input type="text" id="lastName" required /></label>
        <label>Email<input type="email" id="email" required /></label>
        <label>Phone<input type="tel" id="phone" required /></label>
        <label>Delivery Address<textarea id="address" required></textarea></label>
        <label>Laptop<select id="productId" required>
          <option value="">Select a laptop</option>
          <option value="LAPTOP-001">NimbusBook Pro 14</option>
          <option value="LAPTOP-002">AzureBook Air 13</option>
          <option value="LAPTOP-003">CloudStation 15</option>
        </select></label>
        <label>Quantity<input type="number" id="quantity" min="1" value="1" required /></label>
        <button type="submit">Place Order</button>
      </form>
      <div id="result"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
